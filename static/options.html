<!doctype html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="styles.css">
    <meta charset="utf-8" />
  </head>

  <body>
    <form>
      <label>Filepath template <input type="text" id="filepath" name="filepath" /></label><br>
      <label>Filename template <textarea type="text" id="filename" name="filename"></textarea></label><br>
      <label>Frontmatter template <textarea type="text" id="frontmatter" name="frontmatter"></textarea></label><br>
      <label>Highlight template <textarea type="text" id="highlight" name="highlight"></textarea></label><br>
      <div class="buttons">
        <button class="primary" type="submit">Save</button>
        <button class="secondary" type="reset">Restore defaults</button>
      </div>
    </form>

    <script src="options.js"></script>
  </body>
</html>
