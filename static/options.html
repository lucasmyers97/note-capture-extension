<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
  </head>

  <body>
    <form>
      <label>Filepath <input type="text" id="filepath" name="filepath" /></label><br>
      <label>Filename extension <input type="text" id="filename_extension" name="filename_extension"/></label><br>
      <label>Filename template <textarea type="text" id="filename_template" name="filename_template" rows="10" cols="80"></textarea></label><br>
      <label>Frontmatter template <textarea type="text" id="frontmatter_template" name="frontmatter_template" rows="10" cols="80"></textarea></label><br>
      <label>Highlight template <textarea type="text" id="highlight_template" name="highlight_template" rows="10" cols="100"></textarea></label><br>
      <button type="submit">Save</button>
      <button type="reset">Restore defaults</button>
    </form>

    <script src="options.js"></script>
  </body>
</html>
